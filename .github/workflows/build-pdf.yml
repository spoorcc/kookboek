name: Build PDF

on:
  push:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          extra_system_packages: ""
          args: -xelatex -jobname=KookboekFamilieSpoor

      - name: Install print-check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qpdf ghostscript
          pip install --quiet pymupdf

      - name: Flatten PDF transparency
        run: python3 scripts/flatten_transparency.py KookboekFamilieSpoor.pdf

      - name: Lulu print-readiness check
        run: python3 scripts/lulu_lint.py KookboekFamilieSpoor.pdf

      - name: Build cover PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cover/cover.tex
          latexmk_use_xelatex: true
          extra_system_packages: ""
          args: -xelatex -jobname=KookboekFamilieSpoor-cover -output-directory=.

      - name: Flatten cover PDF transparency
        run: python3 scripts/flatten_transparency.py KookboekFamilieSpoor-cover.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: kookboek
          path: KookboekFamilieSpoor.pdf
          retention-days: 30

      - name: Upload cover PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: kookboek-cover
          path: KookboekFamilieSpoor-cover.pdf
          retention-days: 30

  release:
    needs: build-pdf
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: kookboek

      - name: Download cover PDF
        uses: actions/download-artifact@v4
        with:
          name: kookboek-cover

      - name: Update latest draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          draft: true
          files: |
            KookboekFamilieSpoor.pdf
            KookboekFamilieSpoor-cover.pdf
          body: "Built from `${{ github.sha }}`"
