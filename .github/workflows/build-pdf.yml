name: Build PDF

on:
  push:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          extra_system_packages: ""
          args: -xelatex -jobname=KookboekFamilieSpoor

      - name: Lulu print-readiness check
        run: |
          pip install --quiet pymupdf
          python3 scripts/lulu_lint.py KookboekFamilieSpoor.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: kookboek
          path: KookboekFamilieSpoor.pdf
          retention-days: 30

  release:
    needs: build-pdf
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: kookboek

      - name: Update latest draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          draft: true
          files: KookboekFamilieSpoor.pdf
          body: "Built from `${{ github.sha }}`"
