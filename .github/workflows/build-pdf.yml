name: Build PDF

on:
  push:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: kookboek
          path: main.pdf
          retention-days: 30

  release:
    needs: build-pdf
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: kookboek

      - name: Update latest draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          gh release delete latest --yes --cleanup-tag --repo "$REPO" 2>/dev/null || true
          gh release create latest main.pdf \
            --draft \
            --title "Latest" \
            --notes "Built from ${SHA::7} on $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --repo "$REPO"
