<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kookboek · Familie Spoor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --sidebar-bg: #f5f5f5;
      --viewer-bg:  #e8e8e8;
      --text:       #111111;
      --muted:      #666666;
      --accent:     #111111;
      --accent2:    #444444;
      --border:     #d0d0d0;
      --sidebar-w:  300px;
      --header-h:   54px;
      --footer-h:   46px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ───────────────────────────────── */
    header {
      height: var(--header-h);
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.08em;
    }

    .header-title .sep { opacity: 0.4; font-size: 0.75rem; }

    .header-title .sub {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      font-variant: small-caps;
      opacity: 0.75;
    }

    #dl-full {
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 5px 14px;
      font-family: Georgia, serif;
      font-size: 0.8rem;
      border-radius: 2px;
      letter-spacing: 0.04em;
      transition: background 0.18s;
      white-space: nowrap;
    }
    #dl-full:hover { background: rgba(255,255,255,0.14); }

    #sidebar-toggle {
      color: #fff;
      background: none;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 2px;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.18s;
      flex-shrink: 0;
    }
    #sidebar-toggle:hover { background: rgba(255,255,255,0.14); }

    /* ── Two-column layout ────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────── */
    aside {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.26s ease, width 0.26s ease, min-width 0.26s ease, border-color 0.26s ease;
    }

    @media (min-width: 681px) {
      #sidebar.collapsed {
        width: 0;
        min-width: 0;
        border-right-color: transparent;
      }
    }

    /* ── Sidebar top: cover + title ───────────── */
    .sidebar-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
      border-bottom: 1px solid #000;
    }

    #cover-thumb {
      display: none;
      height: 72px;
      width: auto;
      flex-shrink: 0;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .sidebar-brand { flex: 1; min-width: 0; }
    .sidebar-brand-main {
      font-size: 1.05rem;
      letter-spacing: 0.07em;
      line-height: 1.2;
    }
    .sidebar-brand-sub {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      font-variant: small-caps;
      opacity: 0.65;
      margin-top: 3px;
    }

    /* ── Tabs ─────────────────────────────────── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 9px 6px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab:hover:not(.active) {
      color: var(--text);
      background: rgba(0,0,0,0.04);
    }

    /* ── Search ───────────────────────────────── */
    .search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    #search {
      width: 100%;
      padding: 7px 11px;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); font-style: italic; }

    /* ── Recipe list ──────────────────────────── */
    #recipe-list, #register-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 16px;
    }
    #recipe-list::-webkit-scrollbar,
    #register-list::-webkit-scrollbar { width: 5px; }
    #recipe-list::-webkit-scrollbar-track,
    #register-list::-webkit-scrollbar-track { background: transparent; }
    #recipe-list::-webkit-scrollbar-thumb,
    #register-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .ch-label, .alpha-label {
      padding: 12px 14px 4px;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent2);
      font-weight: bold;
    }
    .ch-label:not(:first-child), .alpha-label:not(:first-child) {
      margin-top: 6px;
      border-top: 1px solid var(--border);
    }

    .recipe-row {
      padding: 7px 14px 7px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background 0.12s;
      user-select: none;
    }
    .recipe-row:hover { background: rgba(0,0,0,0.06); }
    .recipe-row.active {
      background: var(--accent);
      color: #fff;
      border-left-color: var(--accent2);
    }
    .recipe-row.hidden { display: none; }

    /* ── Register list rows ───────────────────── */
    .reg-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px 6px 18px;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background 0.12s;
      user-select: none;
    }
    .reg-row:hover { background: rgba(0,0,0,0.06); }
    .reg-row.active {
      background: var(--accent);
      color: #fff;
      border-left-color: var(--accent2);
    }
    .reg-row.hidden { display: none; }

    .reg-pages {
      font-size: 0.74rem;
      color: var(--muted);
      font-style: italic;
      margin-left: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .reg-row.active .reg-pages { color: rgba(255,255,255,0.55); }

    /* ── Viewer ───────────────────────────────── */
    main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--viewer-bg);
      overflow: hidden;
    }

    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      overflow: auto;
      position: relative;
    }

    .pdf-page {
      display: none;
      box-shadow: 0 4px 22px rgba(0,0,0,0.28);
      background: #fff;
      flex-shrink: 0;
    }

    #welcome {
      text-align: center;
      color: var(--muted);
      max-width: 340px;
      padding: 20px;
    }
    #welcome h2 {
      font-weight: normal;
      font-size: 1.55rem;
      color: var(--accent);
      margin-bottom: 10px;
    }
    #welcome .orn { color: var(--accent2); margin: 12px 0; font-size: 1rem; }
    #welcome p { font-style: italic; line-height: 1.65; font-size: 0.92rem; }

    #loading-msg {
      display: none;
      position: absolute;
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Viewer footer ────────────────────────── */
    #viewer-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: var(--footer-h);
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      padding: 0 14px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 5px 15px;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 0.82rem;
      color: var(--text);
      border-radius: 2px;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #dl-recipe-btn {
      display: none;
      margin-left: 6px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    #dl-recipe-btn:hover:not(:disabled) { background: var(--accent2); border-color: var(--accent2); }
    #dl-recipe-btn.busy { opacity: 0.6; cursor: wait; }

    #page-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      min-width: 140px;
      text-align: center;
    }

    /* ── Mobile ───────────────────────────────── */
    #back-mobile { display: none; }

    @media (max-width: 680px) {
      :root { --sidebar-w: 100%; }

      aside {
        position: absolute;
        inset: var(--header-h) 0 0 0;
        z-index: 30;
        width: 100%;
      }
      aside.slide-out { transform: translateX(-100%); }

      #back-mobile { display: block; }
      #viewer-bar { justify-content: space-between; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="Receptenlijst in-/uitklappen" aria-label="Receptenlijst in-/uitklappen" aria-pressed="false">☰</button>
    <h1>Kookboek</h1>
    <span class="sep">♦</span>
    <span class="sub">Familie Spoor</span>
  </div>
  <a id="dl-full" href="KookboekFamilieSpoor.pdf" download="KookboekFamilieSpoor.pdf">↓ Volledig boek</a>
</header>

<div class="layout">

  <aside id="sidebar">

    <!-- Cover thumbnail + brand -->
    <div class="sidebar-top">
      <canvas id="cover-thumb" title="Voorkant — klik om te openen"></canvas>
      <div class="sidebar-brand">
        <div class="sidebar-brand-main">Kookboek</div>
        <div class="sidebar-brand-sub">Familie Spoor</div>
      </div>
    </div>

    <!-- Recepten / Register tabs -->
    <div class="tab-bar">
      <button class="tab active" id="tab-recepten" onclick="switchTab('recepten')">Recepten</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Zoek een recept…" autocomplete="off" spellcheck="false">
    </div>

    <!-- Recipe list -->
    <div id="recipe-list">
      <div style="padding:20px 14px;color:var(--muted);font-style:italic;font-size:0.9rem">Recepten laden…</div>
    </div>

    <!-- Register list -->
    <div id="register-list" style="display:none">
      <div style="padding:20px 14px;color:var(--muted);font-style:italic;font-size:0.9rem">Register laden…</div>
    </div>

  </aside>

  <main>
    <div id="canvas-area">
      <div id="welcome">
        <h2>Recepten van de familie</h2>
        <div class="orn">♦</div>
        <p>Kies een recept uit de lijst om het te lezen. Gebruik het zoekvak om snel te vinden wat je zoekt.</p>
      </div>
      <div id="loading-msg">Laden…</div>
      <canvas id="canvas-l" class="pdf-page"></canvas>
      <canvas id="canvas-r" class="pdf-page"></canvas>
    </div>

    <div id="viewer-bar">
      <button class="nav-btn" id="back-mobile" onclick="showSidebar()">← Lijst</button>
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Vorige</button>
      <span id="page-label"></span>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Volgende →</button>
      <button class="nav-btn" id="dl-recipe-btn" onclick="downloadRecipe()">↓ Recept</button>
    </div>
  </main>

</div>

<!-- PDF.js 3.11.174 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- pdf-lib 1.17.1 — used to extract recipe pages for download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
'use strict';

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf              = null;
let pdfBytes         = null;
let recipes          = [];
let registerData     = [];
let curPage          = 1;
let currentRecipeIdx = null;
let activeTab        = 'recepten';

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  // Load recipe index
  try {
    const res = await fetch('recipes.json');
    if (!res.ok) throw new Error(res.statusText);
    recipes = await res.json();
    buildSidebar(recipes);
  } catch {
    document.getElementById('recipe-list').innerHTML =
      '<div style="padding:16px;color:var(--muted);font-size:.88rem">Receptenlijst niet beschikbaar.</div>';
  }

  // Load register index
  try {
    const res = await fetch('register.json');
    if (res.ok) {
      registerData = await res.json();
      buildRegister(registerData);
    } else {
      document.getElementById('register-list').innerHTML =
        '<div style="padding:16px;color:var(--muted);font-style:italic;font-size:.88rem">Register niet beschikbaar.</div>';
    }
  } catch {
    document.getElementById('register-list').innerHTML =
      '<div style="padding:16px;color:var(--muted);font-style:italic;font-size:.88rem">Register niet beschikbaar.</div>';
  }

  // Fetch PDF; share bytes with pdf.js and keep original for pdf-lib
  try {
    const response = await fetch('KookboekFamilieSpoor.pdf');
    pdfBytes = await response.arrayBuffer();
    pdf = await pdfjsLib.getDocument({ data: pdfBytes.slice() }).promise;
    renderCoverThumb();
  } catch (e) {
    console.warn('PDF laden mislukt:', e);
  }
}

// ── Cover thumbnail ───────────────────────────────────────────────────────

async function renderCoverThumb() {
  if (!pdf) return;
  const canvas = document.getElementById('cover-thumb');
  try {
    const page = await pdf.getPage(1);
    const vp0   = page.getViewport({ scale: 1 });
    const scale = 72 / vp0.height;
    const vp    = page.getViewport({ scale });
    const dpr   = window.devicePixelRatio || 1;

    canvas.width  = Math.round(vp.width  * dpr);
    canvas.height = Math.round(vp.height * dpr);
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    canvas.style.display = 'block';
    canvas.onclick = () => { curPage = 1; renderSpread(1); };
  } catch (e) {
    console.warn('Cover thumbnail mislukt:', e);
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-recepten').classList.toggle('active', tab === 'recepten');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('recipe-list').style.display   = tab === 'recepten' ? '' : 'none';
  document.getElementById('register-list').style.display = tab === 'register'  ? '' : 'none';
  document.getElementById('search').placeholder =
    tab === 'recepten' ? 'Zoek een recept…' : 'Zoek in register…';
  // Re-apply current query for the new tab
  filterAll(document.getElementById('search').value.toLowerCase().trim());
}

// ── Sidebar — recipes ─────────────────────────────────────────────────────

function buildSidebar(list) {
  const container = document.getElementById('recipe-list');
  container.innerHTML = '';
  let chapter = null;

  list.forEach((r, i) => {
    if (r.chapter !== chapter) {
      chapter = r.chapter;
      const h = document.createElement('div');
      h.className = 'ch-label';
      h.textContent = r.chapter;
      h.dataset.chapter = r.chapter;
      container.appendChild(h);
    }
    const row = document.createElement('div');
    row.className = 'recipe-row';
    row.textContent = r.title;
    row.dataset.idx = i;
    row.addEventListener('click', () => openRecipe(i, row));
    container.appendChild(row);
  });
}

// ── Sidebar — register ────────────────────────────────────────────────────

function buildRegister(list) {
  const container = document.getElementById('register-list');
  container.innerHTML = '';

  if (!list.length) {
    container.innerHTML =
      '<div style="padding:16px;color:var(--muted);font-style:italic;font-size:.88rem">Register leeg.</div>';
    return;
  }

  let currentLetter = null;
  list.forEach(entry => {
    const letter = entry.entry.charAt(0).toUpperCase();
    if (letter !== currentLetter) {
      currentLetter = letter;
      const h = document.createElement('div');
      h.className = 'alpha-label';
      h.textContent = letter;
      h.dataset.letter = letter;
      container.appendChild(h);
    }

    const row = document.createElement('div');
    row.className = 'reg-row';
    row.dataset.entry  = entry.entry.toLowerCase();
    row.dataset.letter = letter;
    row.dataset.page   = entry.pages[0];

    const name = document.createElement('span');
    name.textContent = entry.entry;

    const pg = document.createElement('span');
    pg.className = 'reg-pages';
    pg.textContent = entry.pages.join(', ');

    row.appendChild(name);
    row.appendChild(pg);
    row.addEventListener('click', () => openRegisterEntry(entry.pages[0], row));
    container.appendChild(row);
  });
}

// ── Open recipe ───────────────────────────────────────────────────────────

function openRecipe(idx, rowEl) {
  document.querySelectorAll('.recipe-row.active').forEach(e => e.classList.remove('active'));
  rowEl.classList.add('active');
  currentRecipeIdx = idx;
  curPage = recipes[idx].page;
  renderSpread(curPage);
  document.getElementById('dl-recipe-btn').style.display = '';
  if (window.innerWidth <= 680) document.getElementById('sidebar').classList.add('slide-out');
}

function openRegisterEntry(page, rowEl) {
  document.querySelectorAll('.reg-row.active').forEach(e => e.classList.remove('active'));
  rowEl.classList.add('active');
  currentRecipeIdx = null;
  document.getElementById('dl-recipe-btn').style.display = 'none';
  curPage = page;
  renderSpread(page);
  if (window.innerWidth <= 680) document.getElementById('sidebar').classList.add('slide-out');
}

function showSidebar() {
  document.getElementById('sidebar').classList.remove('slide-out');
}

// ── Collapse sidebar (tablet / desktop full-screen reading) ────────────────

function toggleSidebar() {
  const aside  = document.getElementById('sidebar');
  const btn    = document.getElementById('sidebar-toggle');
  const mobile = window.innerWidth <= 680;
  const cls    = mobile ? 'slide-out' : 'collapsed';
  const hidden = aside.classList.toggle(cls);

  btn.setAttribute('aria-pressed', hidden);

  const bar = document.getElementById('viewer-bar');
  if (bar.style.display === 'flex') {
    setTimeout(() => renderSpread(curPage), 280);
  }
}

// ── PDF rendering ─────────────────────────────────────────────────────────

async function renderSpread(leftPage) {
  if (!pdf) {
    setTimeout(() => renderSpread(leftPage), 300);
    return;
  }

  const area    = document.getElementById('canvas-area');
  const cl      = document.getElementById('canvas-l');
  const cr      = document.getElementById('canvas-r');
  const bar     = document.getElementById('viewer-bar');
  const lmsg    = document.getElementById('loading-msg');
  const welcome = document.getElementById('welcome');

  welcome.style.display = 'none';
  lmsg.style.display    = 'block';
  cl.style.display      = 'none';
  cr.style.display      = 'none';
  bar.style.display     = 'flex';

  const total     = pdf.numPages;
  const wide      = area.clientWidth > 620;
  const showRight = wide && leftPage + 1 <= total;

  const hPad = 36 * (showRight ? 2 : 1) + (showRight ? 10 : 0);
  const availW = (area.clientWidth  - hPad) / (showRight ? 2 : 1);
  const availH =  area.clientHeight - 36;

  try {
    await renderPage(leftPage, cl, availW, availH);
    cl.style.display = 'block';
    if (showRight) {
      await renderPage(leftPage + 1, cr, availW, availH);
      cr.style.display = 'block';
    }
  } catch (err) {
    console.error('Render error:', err);
  }

  lmsg.style.display = 'none';

  const hi = showRight ? leftPage + 1 : leftPage;
  document.getElementById('page-label').textContent =
    leftPage === hi ? `pagina ${leftPage}` : `pagina ${leftPage} – ${hi}`;
  document.getElementById('prev-btn').disabled = leftPage <= 1;
  document.getElementById('next-btn').disabled = hi >= total;
}

async function renderPage(pageNum, canvas, maxW, maxH) {
  const page = await pdf.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const scale = Math.min(maxW / base.width, maxH / base.height, 3.0);
  const vp    = page.getViewport({ scale });
  const dpr   = window.devicePixelRatio || 1;

  canvas.style.width  = vp.width  + 'px';
  canvas.style.height = vp.height + 'px';
  canvas.width        = Math.round(vp.width  * dpr);
  canvas.height       = Math.round(vp.height * dpr);

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
}

// ── Navigation ────────────────────────────────────────────────────────────

function navigate(dir) {
  if (!pdf) return;
  const step  = document.getElementById('canvas-area').clientWidth > 620 ? 2 : 1;
  const total = pdf.numPages;
  curPage = Math.max(1, Math.min(total, curPage + dir * step));
  renderSpread(curPage);
}

// ── Recipe download ───────────────────────────────────────────────────────

async function downloadRecipe() {
  if (currentRecipeIdx === null || !pdfBytes) return;

  const btn    = document.getElementById('dl-recipe-btn');
  const recipe = recipes[currentRecipeIdx];

  btn.classList.add('busy');
  btn.disabled = true;

  try {
    const { PDFDocument } = PDFLib;
    const srcDoc = await PDFDocument.load(pdfBytes);
    const newDoc = await PDFDocument.create();

    const from    = recipe.page - 1;
    const to      = recipe.endPage - 1;
    const indices = Array.from({ length: to - from + 1 }, (_, i) => from + i);

    const copied = await newDoc.copyPagesFrom(srcDoc, indices);
    copied.forEach(p => newDoc.addPage(p));

    const bytes = await newDoc.save();
    const blob  = new Blob([bytes], { type: 'application/pdf' });
    const url   = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href     = url;
    a.download = recipe.title + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch (err) {
    console.error('Download mislukt:', err);
    alert('Downloaden mislukt. Gebruik "Volledig boek" als alternatief.');
  } finally {
    btn.classList.remove('busy');
    btn.disabled = false;
  }
}

// ── Touch swipe navigation ────────────────────────────────────────────────

(function () {
  let tx0 = 0, ty0 = 0;
  const area = document.getElementById('canvas-area');

  area.addEventListener('touchstart', function (e) {
    tx0 = e.changedTouches[0].clientX;
    ty0 = e.changedTouches[0].clientY;
  }, { passive: true });

  area.addEventListener('touchend', function (e) {
    if (!pdf) return;
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
    navigate(dx < 0 ? 1 : -1);
  }, { passive: true });
}());

// ── Search ────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', function () {
  filterAll(this.value.toLowerCase().trim());
});

function filterAll(q) {
  if (activeTab === 'recepten') {
    filterRecipes(q);
  } else {
    filterRegister(q);
  }
}

function filterRecipes(q) {
  const rows   = document.querySelectorAll('.recipe-row');
  const labels = document.querySelectorAll('.ch-label');

  if (!q) {
    rows.forEach(r => r.classList.remove('hidden'));
    labels.forEach(l => l.style.display = '');
    return;
  }

  const visible = new Set();
  rows.forEach(r => {
    const match = r.textContent.toLowerCase().includes(q);
    r.classList.toggle('hidden', !match);
    if (match) visible.add(recipes[+r.dataset.idx].chapter);
  });
  labels.forEach(l => {
    l.style.display = visible.has(l.dataset.chapter) ? '' : 'none';
  });
}

function filterRegister(q) {
  const rows   = document.querySelectorAll('.reg-row');
  const labels = document.querySelectorAll('.alpha-label');

  if (!q) {
    rows.forEach(r => r.classList.remove('hidden'));
    labels.forEach(l => l.style.display = '');
    return;
  }

  const visibleLetters = new Set();
  rows.forEach(r => {
    const match = r.dataset.entry.includes(q);
    r.classList.toggle('hidden', !match);
    if (match) visibleLetters.add(r.dataset.letter);
  });
  labels.forEach(l => {
    l.style.display = visibleLetters.has(l.dataset.letter) ? '' : 'none';
  });
}

init();
